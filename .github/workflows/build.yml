name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK using official Kivy buildozer image
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e ANDROID_SDK_ROOT=/home/user/.buildozer/android/platform/android-sdk \
            kivy/buildozer \
            sh -c "yes | buildozer android debug"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evoker-reborn-apk
          path: bin/*.apk
